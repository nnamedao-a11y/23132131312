<svg width="66" height="60" viewBox="0 0 66 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Parts Sourcing & Delivery — single consolidated icon.
    Replaces the previous 5-piece composition (Vector2 + Vector13 +
    Vector14 + Vector3 + Vector12) that suffered from sub-pixel
    fragment scaling (the package outline was 2px on a 24px square
    that got shrunk to 7.8×7.8, making the stroke effectively 0.6px).

    Layout:
      • 8-ray sun / spark      24 × 24 at top-left  — "sourced from afar"
      • Package box            32 × 26 rounded rx=3 at bottom-right
      • Box flap line          inside top of the box (header band)
      • Vertical seam          centred — emphasises 3-dimensional package
  -->

  <!-- 8-ray sun / spark, 24×24, top-left -->
  <!-- Centre body -->
  <circle cx="15" cy="15" r="4" stroke="#F5B800" stroke-width="2"/>
  <!-- 4 cardinal rays -->
  <path d="M15 3V6" stroke="#F5B800" stroke-width="2" stroke-linecap="round"/>
  <path d="M15 24V27" stroke="#F5B800" stroke-width="2" stroke-linecap="round"/>
  <path d="M3 15H6" stroke="#F5B800" stroke-width="2" stroke-linecap="round"/>
  <path d="M24 15H27" stroke="#F5B800" stroke-width="2" stroke-linecap="round"/>
  <!-- 4 diagonal rays -->
  <path d="M6.5 6.5L8.5 8.5" stroke="#F5B800" stroke-width="2" stroke-linecap="round"/>
  <path d="M21.5 21.5L23.5 23.5" stroke="#F5B800" stroke-width="2" stroke-linecap="round"/>
  <path d="M23.5 6.5L21.5 8.5" stroke="#F5B800" stroke-width="2" stroke-linecap="round"/>
  <path d="M6.5 23.5L8.5 21.5" stroke="#F5B800" stroke-width="2" stroke-linecap="round"/>

  <!-- Package box: 32×26 at (32, 32) with rx=3 — "the parts package" -->
  <rect x="32" y="32" width="32" height="26" rx="3"
        stroke="#F5B800" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Top flap line inside the box, at y=39 -->
  <path d="M32 39H64" stroke="#F5B800" stroke-width="2" stroke-linecap="round"/>

  <!-- Vertical seam down the centre of the box -->
  <path d="M48 32V39" stroke="#F5B800" stroke-width="2" stroke-linecap="round"/>
</svg>
