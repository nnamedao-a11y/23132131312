<svg width="80" height="72" viewBox="0 0 80 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Home Delivery — single consolidated icon. Replaces the previous
    6-piece composition (Vector15 house + 2× Vector16 door lines +
    Vector3 step line + Vector17 car body + 2× Vector2 wheel circles).

    The original suffered from sub-pixel wheel rendering: the wheel
    circles were Vector2 (54×54 source with 2px stroke) shrunk to
    7.8×7.8 — producing an effective stroke of ~0.29 px which looked
    like a hair-line.

    Layout (everything natively at stroke-width 2):
      • House (roof + body)  46 × 36 at top-right (x: 30 → 76, y: 0 → 36)
      • Front door           inside house body
      • Driveway / road line spans the bottom edge
      • Car silhouette       at bottom-left, 44 × 22
          – Cabin             smaller raised rectangle
          – Body              larger floor rectangle
          – Two wheels        4 px radius each, stroke 2 (4 px circle)
  -->

  <!-- ──────── HOUSE ──────── -->
  <!-- Pentagon outline: roof + body — drawn as one path. House occupies
       (30, 1) → (76, 36). Roof apex at (53, 1). -->
  <path d="M30 18
           L 53 1
           L 76 18
           L 71 18
           L 71 36
           L 35 36
           L 35 18
           L 30 18 Z"
        stroke="#F5B800" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Front door inside the house: 10 × 14 at (48, 22) → (58, 36) -->
  <path d="M48 36 L 48 22 L 58 22 L 58 36"
        stroke="#F5B800" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Door handle (small dot) -->
  <circle cx="55" cy="30" r="0.5"
          fill="#F5B800"/>

  <!-- ──────── GROUND LINE (driveway) ──────── -->
  <path d="M2 60 H 78" stroke="#F5B800" stroke-width="2" stroke-linecap="round"/>

  <!-- ──────── CAR (bottom-left, arriving) ──────── -->
  <!-- Lower body: 44 × 12 rounded — at (4, 48) → (48, 60) -->
  <path d="M6 60
           L 6 53
           A 1 1 0 0 1 7 52
           L 13 52
           L 18 44
           L 36 44
           L 41 52
           L 47 52
           A 1 1 0 0 1 48 53
           L 48 60"
        stroke="#F5B800" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Cabin divider line (between door pillars) -->
  <path d="M27 44 V 52"
        stroke="#F5B800" stroke-width="2" stroke-linecap="round"/>

  <!-- Wheel-well cut-outs (so wheels visually sit on the body) -->
  <path d="M11 60 A 4 4 0 0 1 19 60"
        stroke="#F5B800" stroke-width="2" stroke-linecap="round"/>
  <path d="M35 60 A 4 4 0 0 1 43 60"
        stroke="#F5B800" stroke-width="2" stroke-linecap="round"/>

  <!-- Two wheels: 8 × 8 circles centred at (15, 64) and (39, 64),
       both rendered with stroke-width 2 NATIVELY (no scaling),
       fixing the previous "thin wheel" bug. -->
  <circle cx="15" cy="64" r="4" stroke="#F5B800" stroke-width="2"/>
  <circle cx="39" cy="64" r="4" stroke="#F5B800" stroke-width="2"/>
</svg>
