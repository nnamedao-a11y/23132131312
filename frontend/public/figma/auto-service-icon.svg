<svg width="60" height="60" viewBox="20 34 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Auto Service — single consolidated icon.

    User-supplied Figma spec:
       Outer shell : 58 × 58   (the existing "shield with notches" path,
                                 extracted as-is from the original
                                 gemini-svg-1-1.svg so the visual stays
                                 identical to the design).
       Inner mark  : 20 × 20   GPS-fix / target crosshair, centred
                                 inside the shell at the shell's centre
                                 (50, 64) in viewBox coords.
       Border      : 2 px native, colour #F5B800.

    The previous version of this card had only the shell with a stray
    6 px line in the corner ("какая-то пустота в центре"). This rebuild
    keeps the same outer shape and properly drops the GPS crosshair in
    the middle.
  -->

