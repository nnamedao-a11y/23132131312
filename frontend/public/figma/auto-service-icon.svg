  <!-- Four cardinal tick marks extending OUT of the ring -->
  <path d="M50 54 V 58" stroke="#F5B800" stroke-width="2" stroke-linecap="round"/>
  <path d="M50 70 V 74" stroke="#F5B800" stroke-width="2" stroke-linecap="round"/>
